name: Spotify Auto-Sync

on:
  schedule:
    # Runs at 10:00 UTC (12:00 CET) every Friday
    - cron: '0 10 * * 5'
  workflow_dispatch: # Allows manual trigger from the Actions UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          pip install python-dotenv paramiko

      - name: Fetch Latest Discography & Generate Blog
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CI: "true"
        run: |
          python fetch_discography.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Vellúa Bot"
          git config --global user.email "bot@vellua-music.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-sync: Updated Spotify discography and generated blog article" && git push)
